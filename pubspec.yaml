name: orynta
description: "Orynta — Capture Ideas. Organize Life. A production-ready note-taking app."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ─── State Management ────────────────────────────────────────────────────────
  # flutter_riverpod: Flutter adapter (ProviderScope, ConsumerWidget, ref).
  # riverpod_annotation: @riverpod annotation for code-gen providers.
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ─── Navigation ──────────────────────────────────────────────────────────────
  # GoRouter: declarative routing, named routes, deep linking.
  go_router: ^14.2.7

  # ─── Local Storage ───────────────────────────────────────────────────────────
  # hive_flutter: fast, lightweight NoSQL key-value store with Flutter helpers.
  # path_provider: resolves the device's document directory for Hive storage.
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  path_provider: ^2.1.3

  # ─── Typography ──────────────────────────────────────────────────────────────
  # google_fonts: Inter (body) + Playfair Display (headings) loaded at runtime.
  google_fonts: ^6.2.1

  # ─── Animations ──────────────────────────────────────────────────────────────
  # flutter_animate: chainable declarative micro-animations.
  flutter_animate: ^4.5.0

  # ─── Domain / Functional (Phase 1) ──────────────────────────────────────────
  # freezed_annotation: @freezed annotation for immutable domain entities.
  # MUST be a direct dependency — imported directly in note_entity.dart and
  # all future domain entity files. Listing only in dev (under freezed) would
  # cause the depend_on_referenced_packages lint error.
  freezed_annotation: ^2.4.1

  # fpdart: functional Dart — Either<Failure, T> for repository return types.
  # Preferred over dartz: actively maintained, full null-safety, cleaner API.
  fpdart: ^1.1.0

  # local_auth: biometric authentication (fingerprint/face unlock).
  local_auth: ^2.2.0

  # crypto: hashing algorithms (SHA-256 for PIN security).
  crypto: ^3.0.3

  # uuid: UUID v4 generation for unique, collision-free note IDs.
  uuid: ^4.5.1

  # intl: date/time formatting — e.g., DateFormat('MMM d').format(note.updatedAt).
  intl: ^0.19.0

  # flutter_local_notifications: local notifications plugin
  flutter_local_notifications: ^17.2.0

  # timezone: required by flutter_local_notifications for zonedSchedule
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_native_splash: ^2.4.0

  # ─── Lint Rules ──────────────────────────────────────────────────────────────
  # flutter_lints: official Flutter lint ruleset.
  # custom_lint: plugin system required for riverpod_lint to run.
  # riverpod_lint: Riverpod-specific lint rules.
  flutter_lints: ^4.0.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

  # ─── Code Generation ─────────────────────────────────────────────────────────
  # build_runner: CLI that runs all code generators.
  # riverpod_generator: generates @riverpod provider boilerplate (.g.dart files).
  # freezed: generates immutable data classes from @freezed annotations.
  #   Pinned to ^2.5.2 — last version compatible with analyzer <7.0.0,
  #   which is required by riverpod_generator 2.x and custom_lint 0.6.x.
  #   hive_generator was intentionally REMOVED: it pins analyzer <7.0.0 and
  #   causes macros conflicts on Dart 3.12. TypeAdapters are written manually.
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  image_path: "assets/images/orynta_icon_.png"
  adaptive_icon_foreground: "assets/images/orynta_icon_.png"
  adaptive_icon_background: "#000000"
  remove_alpha_ios: true
  min_sdk_android: 21

flutter_native_splash:
  color: "#000000"
  image: assets/images/orynta_logo.png
  android: true
  ios: true
  fullscreen: true
  android_12:
    color: "#000000"
    image: assets/images/orynta_logo.png
